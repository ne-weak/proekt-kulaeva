<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тест на темперамент</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="container">
        <div id="quiz-card" class="glass-card">
            <div class="progress-container">
                <div id="progress"></div>
            </div>
            
            <div id="quiz-content">
                <h2 id="question-text">Загрузка...</h2>
                <div class="options">
                    <button class="opt-btn" onclick="handleAnswer(1)"><span>1</span> Да, точно</button>
                    <button class="opt-btn" onclick="handleAnswer(2)"><span>2</span> Похоже на меня</button>
                    <button class="opt-btn" onclick="handleAnswer(3)"><span>3</span> Сомневаюсь</button>
                    <button class="opt-btn" onclick="handleAnswer(4)"><span>4</span> Не совсем</button>
                    <button class="opt-btn" onclick="handleAnswer(5)"><span>5</span> Точно нет</button>
                </div>
            </div>
        </div>

        <div id="result-card" class="glass-card hidden">
            <h1 id="result-title">Ваш тип</h1>
            <div id="result-desc" class="description"></div>
            <button class="reset-btn" onclick="location.reload()">Начать заново</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
