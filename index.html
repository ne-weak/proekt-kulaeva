<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Психологический Тест: Тип Характера</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div id="quiz-card" class="card">
            <div class="progress-bar"><div id="progress"></div></div>
            <h2 id="question-text">Загрузка вопроса...</h2>
            <div class="options" id="options-container">
                <button class="opt-btn" onclick="handleAnswer(1)">1 — Да, точно</button>
                <button class="opt-btn" onclick="handleAnswer(2)">2 — Похоже на меня</button>
                <button class="opt-btn" onclick="handleAnswer(3)">3 — Сомневаюсь</button>
                <button class="opt-btn" onclick="handleAnswer(4)">4 — Не совсем</button>
                <button class="opt-btn" onclick="handleAnswer(5)">5 — Точно нет</button>
            </div>
        </div>

        <div id="result-card" class="card hidden">
            <h1 id="result-title">Ваш тип характера</h1>
            <div class="result-description" id="result-desc"></div>
            <button class="reset-btn" onclick="location.reload()">Пройти заново</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
